<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal OS — Performance Dashboard</title>
    <meta name="description"
        content="Centralized performance monitoring system for phase progression, health, skills, academics, and discipline analytics.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-logo">⬡</div>
        <div class="splash-title">PERSONAL OS</div>
        <div class="splash-sub">PERFORMANCE SYSTEM</div>
        <div class="splash-bar">
            <div class="splash-bar-fill"></div>
        </div>
    </div>

    <!-- Mobile Hamburger -->
    <button class="hamburger" onclick="App.toggleSidebar()">
        <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" onclick="App.closeSidebar()"></div>
    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⬡</span>
                <span class="logo-text">PERSONAL OS</span>
            </div>
            <div class="logo-sub">Performance System v1.2</div>
        </div>
        <!-- User Profile (shown when signed in) -->
        <div id="user-profile" class="user-profile" style="display:none;"></div>
        <ul class="nav-list">
            <li><a href="#dashboard" class="nav-link active" data-page="dashboard">
                    <span class="nav-icon">◈</span> Dashboard
                </a></li>
            <li><a href="#phases" class="nav-link" data-page="phases">
                    <span class="nav-icon">◫</span> Phases
                </a></li>
            <li><a href="#habits" class="nav-link" data-page="habits">
                    <span class="nav-icon">◩</span> Habits
                </a></li>
            <li><a href="#skills" class="nav-link" data-page="skills">
                    <span class="nav-icon">◧</span> Skills
                </a></li>
            <li><a href="#academics" class="nav-link" data-page="academics">
                    <span class="nav-icon">◨</span> Academics
                </a></li>
            <li><a href="#time" class="nav-link" data-page="time">
                    <span class="nav-icon">◴</span> Time Tracking
                </a></li>
            <li><a href="#pomodoro" class="nav-link" data-page="pomodoro">
                    <span class="nav-icon">⏱</span> Pomodoro
                </a></li>
            <li><a href="#tasks" class="nav-link" data-page="tasks">
                    <span class="nav-icon">☐</span> Tasks
                </a></li>
            <li><a href="#reports" class="nav-link" data-page="reports">
                    <span class="nav-icon">◳</span> Reports
                </a></li>
            <li><a href="#settings" class="nav-link" data-page="settings">
                    <span class="nav-icon">⚙</span> Settings
                </a></li>
        </ul>
        <div class="sidebar-footer">
            <!-- Google Sign-In Button -->
            <button id="google-signin-btn" class="google-signin-btn" onclick="Auth.signIn()">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                <span>Sign in with Google</span>
            </button>
            <div class="system-status">
                <span class="status-dot"></span>
                <span>Local Only</span>
            </div>
        </div>
    </nav>

    <main id="content">
        <!-- Pages rendered here dynamically -->
    </main>

    <script src="js/utils.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/phases.js"></script>
    <script src="js/habits.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/academics.js"></script>
    <script src="js/time.js"></script>
    <script src="js/pomodoro.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
